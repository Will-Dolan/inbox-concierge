# Local-development-only configuration.
#
# The Postgres credentials below (inbox/inbox) and the published 5432 port
# match the defaults in api/core/config.py and are intentionally weak/open
# for developer convenience (see Makefile's `make dev` / README "Run locally").
# They must never be reused as-is for any shared, staging, or production
# deployment. Per docs/architecture.md's "Local deployment" section, the
# intended cloud target is a managed Postgres (RDS) with credentials sourced
# from environment-specific compose overrides or a secrets manager, not this
# file.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
      POSTGRES_DB: inbox_concierge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox -d inbox_concierge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
